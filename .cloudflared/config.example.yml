# Named tunnel (requiere: cloudflared tunnel login && cloudflared tunnel create vibe-crm)
# Copiar a config.yml y reemplazar <TUNNEL_ID> + ruta del credentials-file.

tunnel: <TUNNEL_ID>
credentials-file: C:\Users\<you>\.cloudflared\<TUNNEL_ID>.json

ingress:
  # API NestJS — Stripe webhooks en /api/webhooks/stripe
  - hostname: api.tudominio.com
    service: http://localhost:4000
  # Next.js (opcional)
  - hostname: app.tudominio.com
    service: http://localhost:3000
  - service: http_status:404
